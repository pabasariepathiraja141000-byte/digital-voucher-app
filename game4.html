<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Love Pop! 🎈</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial,sans-serif;background:linear-gradient(#e0f2fe,#fff5f8);display:flex;justify-content:center;align-items:center;min-height:100vh;user-select:none;-webkit-user-select:none}
#hud{position:fixed;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;font-weight:bold;color:#d6336c;z-index:5}
#game-container{position:relative;width:100vw;height:100vh;overflow:hidden}
.balloon{position:absolute;font-size:45px;cursor:pointer;transition:transform 0.1s ease-out;animation:wobble 2s ease-in-out infinite alternate}
@keyframes wobble{from{margin-left:-5px}to{margin-left:5px}}
#overlay{position:absolute;inset:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:15px;z-index:10;text-align:center;padding:20px}
button{padding:12px 22px;border:none;border-radius:30px;background:#ff4d6d;color:#fff;font-size:16px;cursor:pointer;font-weight:bold}
a{color:#ff4d6d;text-decoration:none;font-weight:bold}
</style>
</head>
<body>

<div id="game-container">
<div id="hud">
<div>🎈 Score: <span id="score">0</span></div>
<div>💥 Misses: <span id="misses">0</span>/5</div>
<div>⏱️ Time: <span id="time">45</span></div>
</div>

<div id="overlay">
<h1>🎈 Love Pop! 🎈</h1>
<p>Tap the rising balloons to pop them before they escape!</p>
<p style="font-size: 13px; color: #666; margin-top: -5px;">⭐ Star balloons = 5 pts | 💣 Spike ball = Game Over!</p>
<button onclick="startGame()">Start Popping</button>
<a href="index.html" style="margin-top: 5px;">🏠 Back to Love Lounge</a>
</div>
</div>

<script>
const container = document.getElementById("game-container");
let score = 0, misses = 0, time = 45, running = false, spawnInterval, clockInterval, animLoop;
let balloons = [];

function startGame() {
 document.getElementById("overlay").style.display = "none";
 document.querySelectorAll(".balloon").forEach(b => b.remove());
 score = 0; misses = 0; time = 45; balloons = [];
 updateHUD();
 running = true;
 
 spawnInterval = setInterval(createBalloon, 600);
 clockInterval = setInterval(() => {
   time--; updateHUD();
   if (time <= 0) endGame(true);
 }, 1000);
 
 animLoop = requestAnimationFrame(updateBalloons);
}

function createBalloon() {
 const b = document.createElement("div");
 b.className = "balloon";
 
 const rand = Math.random();
 if (rand < 0.1) {
    b.textContent = "⭐"; // Special high score balloon
    b.dataset.type = "star";
    b.dataset.speed = 1.5 + Math.random() * 2;
 } else if (rand < 0.2) {
    b.textContent = "💣"; // Bomb item to avoid
    b.dataset.type = "bomb";
    b.dataset.speed = 2 + Math.random() * 2;
 } else {
    b.textContent = Math.random() < 0.5 ? "🎈" : "💝"; // Standard points
    b.dataset.type = "normal";
    b.dataset.speed = 1 + Math.random() * 2;
 }

 b.style.left = Math.random() * (window.innerWidth - 60) + "px";
 b.style.top = window.innerHeight + "px";
 
 // Pop interaction behavior handles desktop click and mobile touches natively
 const popEvent = (e) => {
    e.preventDefault();
    if (!running) return;
    
    if (b.dataset.type === "bomb") {
        endGame(false); // Instantly hits the bomb boundary constraint 
        return;
    }
    
    score += b.dataset.type === "star" ? 5 : 1;
    updateHUD();
    
    // Quick pop contraction feedback animation frame
    b.style.transform = "scale(0)";
    setTimeout(() => b.remove(), 100);
    balloons = balloons.filter(item => item !== b);
 };

 b.addEventListener("mousedown", popEvent);
 b.addEventListener("touchstart", popEvent, {passive: false});

 container.appendChild(b);
 balloons.push(b);
}

function updateBalloons() {
 if (!running) return;

 for (let i = balloons.length - 1; i >= 0; i--) {
    let b = balloons[i];
    let y = parseFloat(b.style.top);
    y -= parseFloat(b.dataset.speed); // Moves UP instead of down
    b.style.top = y + "px";

    // Check if balloon escaped off the upper border edge
    if (y < -60) {
        if (b.dataset.type !== "bomb") { // Bombs escaping won't penalize player
            misses++;
            updateHUD();
            if (misses >= 5) {
                endGame(false);
                return;
            }
        }
        b.remove();
        balloons.splice(i, 1);
    }
 }
 animLoop = requestAnimationFrame(updateBalloons);
}

function updateHUD() {
 document.getElementById("score").textContent = score;
 document.getElementById("misses").textContent = misses;
 document.getElementById("time").textContent = time;
}

function endGame(timeRanOut) {
 running = false;
 clearInterval(spawnInterval);
 clearInterval(clockInterval);
 cancelAnimationFrame(animLoop);

 let high = Math.max(score, +(localStorage.popHighScore || 0));
 localStorage.popHighScore = high;

 const title = timeRanOut ? "🎉 Time's Up!" : "💥 Boom!";
 const message = timeRanOut ? `Great job popping! Score: <b>${score}</b>` : `You hit a bomb! Score reached: <b>${score}</b>`;

 document.getElementById("overlay").innerHTML = `
 <h1>${title}</h1>
 <p>${message}</p>
 <p>🏆 High Score: <b>${high}</b></p>
 <button onclick="startGame()">Play Again</button>
 <a href="index.html" style="margin-top: 5px;">🏠 Back to Love Lounge</a>`;
 document.getElementById("overlay").style.display = "flex";
}
</script>
</body>
</html>
