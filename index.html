<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Love Lounge 💕</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#ffd9e6,#fff5f8);display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
.card{background:#fff;padding:25px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.15);width:360px;text-align:center;position:relative}
h1{color:#ff4d6d;margin:0}
#coupon{margin:20px 0;padding:25px;border:3px dashed #ff7a99;border-radius:18px;font-size:24px;font-weight:bold;color:#ff4d6d;min-height:90px;display:flex;align-items:center;justify-content:center}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:30px;font-size:16px;font-weight:bold;cursor:pointer}
#draw{background:#ff4d6d;color:#fff} #redeem{background:#444;color:#fff}
#gameBtn{
background:#ff8fab;
color:white;
}

#gameBtn:hover{
background:#ff6b9d;
transform:scale(1.03);
}
.stats{display:flex;justify-content:space-between;margin-top:15px}
.box{background:#fff5f8;padding:10px;border-radius:12px;width:47%}
ul{padding-left:18px;text-align:left;max-height:120px;overflow:auto}
.heart,.conf{position:fixed;pointer-events:none}
.heart{animation:float 7s linear forwards;opacity:.25}
.conf{animation:fall 3s linear forwards;font-size:24px}
@keyframes float{from{transform:translateY(110vh)}to{transform:translateY(-20vh) rotate(360deg);opacity:0}}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="card">
<h1>💕 Love Lounge</h1>
<p>Draw a surprise Sir, BINARA!</p>
<div id="coupon">Press Draw ❤️</div>
<button id="draw">🎲 Draw Coupon</button>
<button id="redeem">💝 Redeem Coupon</button>
<button onclick="window.location.href='catch-hearts.html'" id="gameBtn">
  ❤️ Catch Hearts Game
</button>
<div class="stats">
<div class="box"><b id="d">0</b><br>Draws</div>
<div class="box"><b id="r">0</b><br>Redeemed</div>
</div>
<h3>History</h3>
<ul id="history"></ul>
</div>
<script>
const coupons=[
"💋 One Sweet Kiss","🤗 Giant Bear Hug","🍿 Movie Night","Back scratches💋","Back massage💋",🤗 Dinner date",
"💕Cuddles in Bed","💆 Head Massage","Sexy Night💋","2 min long french kiss💋","Head scratches💋",
"🌹 Surprise Flower","💕 Unlimited Cuddles","🚶 Romantic Walk","👑 Princess's Choice"
];
let draws=+localStorage.draws||0;
let redeems=+localStorage.redeems||0;
let current="";
const h=document.getElementById("history");
document.getElementById("d").textContent=draws;
document.getElementById("r").textContent=redeems;
(JSON.parse(localStorage.hist||"[]")).forEach(addHistory);
function save(){
localStorage.draws=draws;
localStorage.redeems=redeems;
}
document.getElementById("draw").onclick=()=>{
const c=document.getElementById("coupon");
c.textContent="🎰 Spinning...";
let i=0;
const t=setInterval(()=>{c.textContent=coupons[Math.floor(Math.random()*coupons.length)];i++;
if(i>15){clearInterval(t);current=c.textContent;draws++;document.getElementById("d").textContent=draws;save();}},80);
};
document.getElementById("redeem").onclick=()=>{
if(!current){alert("Draw a coupon first!");return;}
redeems++;document.getElementById("r").textContent=redeems;
let arr=JSON.parse(localStorage.hist||"[]");arr.unshift(current);arr=arr.slice(0,10);localStorage.hist=JSON.stringify(arr);
h.innerHTML="";arr.forEach(addHistory);save();confetti();alert("Redeemed: "+current);current="";
};
function addHistory(txt){const li=document.createElement("li");li.textContent=txt;h.appendChild(li);}
function confetti(){
const e=["❤️","💖","✨","🌸","💋"];
for(let i=0;i<40;i++){
const d=document.createElement("div");
d.className="conf";d.textContent=e[Math.floor(Math.random()*e.length)];
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(2+Math.random()*2)+"s";
document.body.appendChild(d);
setTimeout(()=>d.remove(),4000);
}}
setInterval(()=>{
const d=document.createElement("div");
d.className="heart";d.textContent=["❤️","💕","💖"][Math.floor(Math.random()*3)];
d.style.left=Math.random()*100+"vw";
d.style.fontSize=(18+Math.random()*18)+"px";
document.body.appendChild(d);
setTimeout(()=>d.remove(),7000);
},900);
</script>
</body></html>
