<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Love Match ❤️</title>
<style>
body{margin:0;padding:20px;font-family:Arial,sans-serif;background:linear-gradient(#ffdbe8,#fff7fa);display:flex;flex-direction:column;align-items:center;min-height:100vh;box-sizing:border-box}
#hud{display:flex;justify-content:space-between;width:100%;max-width:360px;font-weight:bold;color:#d6336c;margin-bottom:15px}
#grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;max-width:360px;perspective:1000px}
.card{aspect-ratio:1;background:#ff4d6d;border-radius:12px;display:flex;justify-content:center;align-items:center;font-size:32px;color:#fff;cursor:pointer;user-select:none;transform-style:preserve-3d;transition:transform .4s;box-shadow:0 4px 8px rgba(214,51,108,0.2)}
.card.flipped{transform:rotateY(180deg);background:#fff;border:2px solid #ff4d6d}
.card .front{transform:rotateY(180deg);display:none}
.card.flipped .front{display:block}
.card.flipped .back{display:none}
#overlay{position:fixed;inset:0;background:rgba(255,255,255,.95);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:15px;z-index:10}
button{padding:12px 22px;border:none;border-radius:30px;background:#ff4d6d;color:#fff;font-size:16px;cursor:pointer;font-weight:bold}
a{color:#ff4d6d;text-decoration:none;font-weight:bold;margin-top:5px}
</style>
</head>
<body>

<div id="hud">
<div>⏱️ Time: <span id="time">45</span>s</div>
<div>✨ Moves: <span id="moves">0</span></div>
</div>

<div id="grid"></div>

<div id="overlay">
<h1>💕 Love Match Game 💕</h1>
<p>Flip and match pairs of love emojis before time runs out!</p>
<button onclick="startGame()">Start Game</button>
<a href="index.html">🏠 Back to Love Lounge</a>
</div>

<script>
const emojis = ["❤️","❤️","💋","💋","🤗","🤗","💖","💖","🌹","🌹","🧸","🧸","🍿","🍿","🍓","🍓"];
const grid = document.getElementById("grid");
let flippedCards = [], matchedPairs = 0, moves = 0, timeLeft = 45, timerInterval, gameRunning = false;

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function createGrid() {
  grid.innerHTML = "";
  const shuffled = shuffle([...emojis]);
  shuffled.forEach((emoji, index) => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.emoji = emoji;
    card.innerHTML = `<span class="back">❓</span><span class="front">${emoji}</span>`;
    card.addEventListener("click", () => flipCard(card));
    grid.appendChild(card);
  });
}

function startGame() {
  document.getElementById("overlay").style.display = "none";
  flippedCards = [];
  matchedPairs = 0;
  moves = 0;
  timeLeft = 45;
  gameRunning = true;
  
  document.getElementById("moves").textContent = moves;
  document.getElementById("time").textContent = timeLeft;
  
  createGrid();
  
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("time").textContent = timeLeft;
    if (timeLeft <= 0) endGame(false);
  }, 1000);
}

function flipCard(card) {
  if (!gameRunning || card.classList.contains("flipped") || flippedCards.length >= 2) return;

  card.classList.add("flipped");
  flippedCards.push(card);

  if (flippedCards.length === 2) {
    moves++;
    document.getElementById("moves").textContent = moves;
    checkMatch();
  }
}

function checkMatch() {
  const [card1, card2] = flippedCards;
  if (card1.dataset.emoji === card2.dataset.emoji) {
    matchedPairs++;
    flippedCards = [];
    if (matchedPairs === emojis.length / 2) endGame(true);
  } else {
    setTimeout(() => {
      card1.classList.remove("flipped");
      card2.classList.remove("flipped");
      flippedCards = [];
    }, 800);
  }
}

function endGame(won) {
  gameRunning = false;
  clearInterval(timerInterval);
  
  let bestMoves = Math.min(moves, +(localStorage.matchBestMoves || 999));
  if (won) localStorage.matchBestMoves = bestMoves;

  const title = won ? "🎉 Perfect Match!" : "⏱️ Out of Time!";
  const subtitle = won ? `You matched everything in <b>${moves}</b> moves!` : "Give it another try!";
  const bestRecord = won ? `<p>🏆 Personal Best: <b>${bestMoves}</b> moves</p>` : "";

  document.getElementById("overlay").innerHTML = `
    <h1>${title}</h1>
    <p>${subtitle}</p>
    ${bestRecord}
    <button onclick="startGame()">Play Again</button>
    <a href="index.html">🏠 Back to Love Lounge</a>
  `;
  document.getElementById("overlay").style.display = "flex";
}
</script>
</body>
</html>
